server:
  port: 8123
  servlet:
    context-path: /api
    session:
      # cookie 配置
      cookie:
        max-age: 2592000
spring:
  application:
    name: tao-picture-backend
  # session 配置
  session:
    store-type: redis
    # session 30天过期
    timeout: 2592000
  profiles:
    active: local
  # 开放更大的文件上传体积
  servlet:
    multipart:
      max-file-size: 10MB

  datasource:
    url: jdbc:mysql://localhost:3306/tao_picture
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    password: root
  # Redis 配置
  redis:
    database: 0
    host: localhost
    port: 6379
    timeout: 5000
    username: root

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: false
    # 仅在开发环境开启日志
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      logic-delete-field: isDelete # 全局逻辑删除的实体字段名
      logic-delete-value: 1 # 逻辑已删除值（默认为 1）
      logic-not-delete-value: 0 # 逻辑未删除值（默认为 0）
# 接口文档配置
knife4j:
  enable: true
  openapi:
    title: "接口文档"
    version: 1.0
    group:
      default:
        api-rule: package
        api-rule-resources:
          - com.tch.controller